
services:

    redis:
        image: redis:alpine
        container_name: kfx-redis
        restart: unless-stopped
        networks:
            - kfx_network
        healthcheck:
            test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
            interval: 10s
            timeout: 3s
            retries: 5

    mariadb:
        image: mariadb:latest
        container_name: kfx-mariadb
        restart: unless-stopped
        environment:
            # Don't pass the whole .env file here for security reasons
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        volumes:
            - kfx_database:/app/lib/mysql
        networks:
            - kfx_network
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            interval: 10s
            timeout: 5s
            retries: 3

    php:
        build:
            context: .
            dockerfile: ./docker/php/Dockerfile
        container_name: kfx-php
        restart: unless-stopped
        volumes:
            - .:/app/www:rw
            - ./docker/php/php.${APP_ENV}.ini:/usr/local/etc/php/conf.d/custom.ini:ro
            - ./docker/php/php-fpm.conf:/usr/local/etc/php-fpm.d/zzz-php-fpm.conf:ro
            - kfx_storage:/app/storage:rw
        depends_on:
            - redis
            - mariadb
        networks:
            - kfx_network
        healthcheck:
            test: ["CMD-SHELL", "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 || exit 1"]
            interval: 10s
            timeout: 3s
            retries: 3

    nginx:
        image: nginx:latest
        container_name: kfx-nginx
        restart: unless-stopped
        volumes:
            - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./docker/nginx/mime.types:/etc/nginx/mime.types:ro
            - .:/app/www:ro
            - kfx_storage:/app/storage:rw
        ports:
            - "127.0.0.1:5500:80"
        depends_on:
            - php
        networks:
            - kfx_network
        healthcheck:
            test: ["CMD-SHELL", "curl -s http://localhost/healthz | grep -q 'OK' || exit 1"]
            interval: 5s
            timeout: 3s
            retries: 3

    cron:
        image: whefter/cron
        container_name: kfx-cron
        restart: unless-stopped
        network_mode: none
        volumes:
            - "/app/run/docker.sock:/app/run/docker.sock"
        environment:
            CRON_APP_TASKS: "* * * * * docker exec -u www-data kfx-php php ./vendor/bin/crunz schedule:run &"
        healthcheck:
            test: ["CMD-SHELL", "pgrep crond || exit 1"]
            interval: 10s
            timeout: 3s
            retries: 3

    clamav:
        image: clamav/clamav:latest
        container_name: kfx-clamav
        restart: unless-stopped
        networks:
            - kfx_network
        healthcheck:
            # Send PING via netcat. grep will only exit 0 when it sees 'PONG'
            test: ["CMD-SHELL", "echo PING | nc -w 2 127.0.0.1 3310 | grep -q PONG || exit 1"]
            start_period: 60s
            interval: 10s
            timeout: 5s
            retries: 5

networks:
    kfx_network:

volumes:
    kfx_storage:
    kfx_database:
